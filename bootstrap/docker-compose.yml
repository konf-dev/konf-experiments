services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      KONF_CONFIG_DIR: /config
      KONF__DATABASE__URL: postgresql://postgres:${POSTGRES_PASSWORD:-pass}@postgres/konf
      KONF__AUTH__SUPABASE_URL: http://supabase-auth:9999
      KONF__MCP_ENABLED: "true"
    volumes:
      - ./config:/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}  # Override in .env for production
      POSTGRES_DB: konf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
